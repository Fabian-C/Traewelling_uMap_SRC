<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kevin1996 Map</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.11.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.11.0/mapbox-gl.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>
  <style>
  </style>

  <div id="map"></div>

  <script>
    const start = {
      center: [80, 36],
      zoom:0.5,
      pitch: 0,
      bearing: 0
      };
      const end = {
      center: [9.75129802739329, 51.541536082534854],
      zoom: 5,
      bearing: 0,
      pitch: 30
      };
    mapboxgl.accessToken = 'pk.eyJ1IjoiaGFzaGVyMTEiLCJhIjoiY2xhbzFubnJ2MHYyeDNvbGJ0N2E4ZGtmcCJ9.Y85sMCOsQLFIyxA7RTO7WA';
    const map = new mapboxgl.Map({
      container: 'map',
      // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
      style: 'mapbox://styles/hasher11/clao26f26002u14ldbbcyajxd',
      ...start
    });
    map.on('style.load', () => {
      map.setFog({
        'high-color': 'rgb(36, 92, 223)', // Blue sky / upper atmosphere
        'horizon-blend': 0.4 // Exaggerate atmosphere (default is .1)
      }); // Set the default atmosphere style
    });
    map.on('load', () => {
      map.flyTo({
        ...end, // Fly to the selected target defined under ...end
        duration: 5000, // Animate over 5 seconds
        essential: true // This animation is considered essential with
        //respect to prefers-reduced-motion
      });
      map.addSource('nationalExpress', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/nationalExpress.geojson'
      });
      map.addSource('national', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/national.geojson'
      });
      map.addSource('regionalExp', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/regionalExp.geojson'
      });
      map.addSource('regional', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/regional.geojson'
      });
      map.addSource('suburban', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/suburban.geojson'
      });
      map.addSource('bus', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/bus.geojson'
      });
      map.addSource('ferry', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/ferry.geojson'
      });
      map.addSource('subway', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/subway.geojson'
      });
      map.addSource('tram', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/tram.geojson'
      });
      map.addSource('taxi', {
        type: 'geojson',
        // Use a URL for the value for the `data` property.
        data: 'https://raw.githubusercontent.com/Fabian-C/Traewelling_uMap_SRC/main/Kevin1996/taxi.geojson'
      });
      map.addLayer({
        'id': 'nationalExpress',
        'type': 'line',
        'source': 'nationalExpress',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#2FC5CC',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'national',
        'type': 'line',
        'source': 'national',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#2FC5CC',
          'line-width': 2
        }
      });

      map.addLayer({
        'id': 'regionalExp',
        'type': 'line',
        'source': 'regionalExp',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#B80F87',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'regional',
        'type': 'line',
        'source': 'regional',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#B80F87',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'suburban',
        'type': 'line',
        'source': 'suburban',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#B21800',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'bus',
        'type': 'line',
        'source': 'bus',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#238443',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'ferry',
        'type': 'line',
        'source': 'ferry',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#800',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'subway',
        'type': 'line',
        'source': 'subway',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#F69A00',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'tram',
        'type': 'line',
        'source': 'tram',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#2FC5CC',
          'line-width': 2
        }
      });
      map.addLayer({
        'id': 'taxi',
        'type': 'line',
        'source': 'taxi',
        'layout': {
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#820DAF',
          'line-width': 2
        }
      });
    });
  </script>
</body>
</html>
